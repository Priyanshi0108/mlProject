<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>
    
    <!-- Filters for Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="soft-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background Decorative Grid (Subtle) -->
  <g opacity="0.25">
    <!-- Concentric Circles -->
    <circle cx="300" cy="300" r="260" fill="none" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 8" />
    <circle cx="300" cy="300" r="200" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="8 6" />
    <circle cx="300" cy="300" r="140" fill="none" stroke="#60a5fa" stroke-width="0.75" />
    
    <!-- Diagonal cross lines -->
    <line x1="80" y1="80" x2="520" y2="520" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="5 5" />
    <line x1="520" y1="80" x2="80" y2="520" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="5 5" />
  </g>

  <!-- Glowing central base -->
  <circle cx="300" cy="300" r="120" fill="url(#glow-grad)" filter="url(#glow)" />

  <!-- Connecting AI/Neural Network Lines (underneath) -->
  <g stroke="url(#primary-grad)" stroke-opacity="0.4" stroke-width="1.5">
    <line x1="300" y1="210" x2="210" y2="300" />
    <line x1="300" y1="210" x2="390" y2="300" />
    <line x1="210" y1="300" x2="300" y2="390" />
    <line x1="390" y1="300" x2="300" y2="390" />
    <line x1="300" y1="210" x2="300" y2="390" />
    <line x1="210" y1="300" x2="390" y2="300" />
    
    <!-- Outer nodes connections -->
    <line x1="210" y1="300" x2="140" y2="210" />
    <line x1="390" y1="300" x2="460" y2="210" />
    <line x1="300" y1="210" x2="300" y2="100" />
    <line x1="210" y1="300" x2="110" y2="350" />
    <line x1="390" y1="300" x2="490" y2="350" />
  </g>

  <!-- Network Nodes (Glowing Dots) -->
  <g fill="url(#primary-grad)">
    <circle cx="300" cy="210" r="6" filter="url(#soft-glow)" />
    <circle cx="210" cy="300" r="6" filter="url(#soft-glow)" />
    <circle cx="390" cy="300" r="6" filter="url(#soft-glow)" />
    <circle cx="300" cy="390" r="6" filter="url(#soft-glow)" />
    
    <!-- Outer Nodes -->
    <circle cx="140" cy="210" r="4" fill="#60a5fa" />
    <circle cx="460" cy="210" r="4" fill="#a855f7" />
    <circle cx="300" cy="100" r="5" fill="#60a5fa" filter="url(#soft-glow)" />
    <circle cx="110" cy="350" r="4" fill="#a855f7" />
    <circle cx="490" cy="350" r="4" fill="#60a5fa" />
  </g>

  <!-- Floating Math & Science Symbols (Futuristic Hologram Style) -->
  <g font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#cbd5e1" opacity="0.85">
    <!-- Summation -->
    <text x="140" y="160" font-size="28" fill="url(#primary-grad)" filter="url(#soft-glow)">∑</text>
    <!-- Pi -->
    <text x="430" y="160" font-size="24" fill="url(#primary-grad)">π</text>
    <!-- Square Root -->
    <text x="100" y="280" font-size="22" fill="#60a5fa">√x</text>
    <!-- f(x) -->
    <text x="460" y="290" font-size="20" fill="#a855f7">f(x)</text>
    <!-- Plus/Minus -->
    <text x="200" y="120" font-size="18" opacity="0.5">±</text>
    <!-- Infinity -->
    <text x="380" y="120" font-size="20" opacity="0.5">∞</text>
    <!-- Math formula -->
    <text x="240" y="470" font-size="14" font-family="monospace" opacity="0.6">y = β₀ + β₁x₁ + ε</text>
  </g>

  <!-- Centerpiece: Glowing Futuristic Graduation Cap / Education Symbol -->
  <g transform="translate(0, -15)">
    <!-- Mortarboard Top (Diamond) -->
    <polygon points="300,240 390,280 300,320 210,280" fill="url(#accent-grad)" opacity="0.95" filter="url(#soft-glow)" stroke="#ffffff" stroke-width="1" />
    <!-- Cap Under-Structure -->
    <path d="M245,296 L245,325 C245,340 270,350 300,350 C330,350 355,340 355,325 L355,296" fill="none" stroke="url(#primary-grad)" stroke-width="3" />
    <path d="M245,296 L245,325 C245,340 270,350 300,350 C330,350 355,340 355,325 L355,296" fill="url(#accent-grad)" opacity="0.3" />
    <!-- Tassel -->
    <path d="M300,280 L355,300 L355,335" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" />
    <rect x="351" y="335" width="8" height="15" rx="2" fill="#60a5fa" />
    <!-- Inner glowing core -->
    <ellipse cx="300" cy="280" rx="15" ry="7" fill="#ffffff" opacity="0.7" filter="url(#soft-glow)" />
  </g>

  <!-- Floating Glassmorphism Cards representing Prediction Dashboard -->
  
  <!-- Left Card: Score Prediction Chart -->
  <g transform="translate(40, 320)" filter="url(#card-shadow)">
    <!-- Card Base -->
    <rect x="0" y="0" width="160" height="120" rx="16" fill="url(#glass-grad)" stroke="url(#primary-grad)" stroke-width="1.5" />
    
    <!-- Card Title -->
    <text x="16" y="24" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff" opacity="0.9">Score Prediction</text>
    
    <!-- Chart Grid Lines -->
    <line x1="20" y1="95" x2="140" y2="95" stroke="#cbd5e1" stroke-width="1" opacity="0.2" />
    <line x1="20" y1="70" x2="140" y2="70" stroke="#cbd5e1" stroke-width="1" opacity="0.1" />
    <line x1="20" y1="45" x2="140" y2="45" stroke="#cbd5e1" stroke-width="1" opacity="0.1" />
    
    <!-- Chart Line (Rising path) -->
    <path d="M20,90 Q40,80 60,65 T100,50 T140,35" fill="none" stroke="url(#primary-grad)" stroke-width="3" filter="url(#soft-glow)" />
    <!-- Chart Dots -->
    <circle cx="60" cy="65" r="4" fill="#60a5fa" />
    <circle cx="100" cy="50" r="4" fill="#a855f7" />
    <circle cx="140" cy="35" r="5" fill="#ffffff" filter="url(#soft-glow)" />
    
    <!-- Interactive Pulse -->
    <circle cx="140" cy="35" r="9" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="5;15;5" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Right Card: Model Accuracy / Score Radial Gauge -->
  <g transform="translate(400, 320)" filter="url(#card-shadow)">
    <!-- Card Base -->
    <rect x="0" y="0" width="160" height="120" rx="16" fill="url(#glass-grad)" stroke="url(#primary-grad)" stroke-width="1.5" />
    
    <!-- Card Title -->
    <text x="16" y="24" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff" opacity="0.9">Accuracy</text>
    
    <!-- Radial Gauge Outline -->
    <circle cx="80" cy="70" r="30" fill="none" stroke="#cbd5e1" stroke-width="6" opacity="0.15" />
    <!-- Radial Gauge Active (97% represented by stroke-dasharray) -->
    <circle cx="80" cy="70" r="30" fill="none" stroke="url(#accent-grad)" stroke-width="6" stroke-dasharray="182.7 188.4" stroke-linecap="round" transform="rotate(-90 80 70)" filter="url(#soft-glow)" />
    
    <!-- Center Text -->
    <text x="80" y="75" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">97%</text>
    
    <!-- Subtitle -->
    <text x="80" y="108" font-family="system-ui, sans-serif" font-size="9" fill="#cbd5e1" opacity="0.8" text-anchor="middle">XGBoost Optimized</text>
  </g>

  <!-- Extra Decorative Sparkles/Data Nodes (representing Machine Learning inputs) -->
  <g opacity="0.7">
    <!-- Feature 1: Reading Score -->
    <g transform="translate(230, 80)">
      <circle cx="0" cy="0" r="8" fill="#60a5fa" opacity="0.2" />
      <circle cx="0" cy="0" r="3" fill="#60a5fa" />
      <text x="8" y="4" font-family="system-ui, sans-serif" font-size="9" fill="#cbd5e1">Reading</text>
    </g>
    <!-- Feature 2: Prep Course -->
    <g transform="translate(370, 80)">
      <circle cx="0" cy="0" r="8" fill="#a855f7" opacity="0.2" />
      <circle cx="0" cy="0" r="3" fill="#a855f7" />
      <text x="-65" y="4" font-family="system-ui, sans-serif" font-size="9" fill="#cbd5e1">Prep Course</text>
    </g>
    <!-- Feature 3: Demographics -->
    <g transform="translate(500, 230)">
      <circle cx="0" cy="0" r="8" fill="#60a5fa" opacity="0.2" />
      <circle cx="0" cy="0" r="3" fill="#60a5fa" />
      <text x="8" y="4" font-family="system-ui, sans-serif" font-size="9" fill="#cbd5e1">Demographics</text>
    </g>
    <!-- Feature 4: Lunch Type -->
    <g transform="translate(90, 230)">
      <circle cx="0" cy="0" r="8" fill="#a855f7" opacity="0.2" />
      <circle cx="0" cy="0" r="3" fill="#a855f7" />
      <text x="-60" y="4" font-family="system-ui, sans-serif" font-size="9" fill="#cbd5e1">Lunch Type</text>
    </g>
  </g>
</svg>
